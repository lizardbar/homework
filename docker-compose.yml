version: "3.8"

services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - sqlite_data:/app/storage
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development
    command: bash -c "bundle install && bundle exec rails db:migrate && bundle exec rails server -b '0.0.0.0'"

volumes:
  bundle_cache:
  sqlite_data:
    driver: local
